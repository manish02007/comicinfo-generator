name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name comicinfo-generator comicinfo_gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/comicinfo-generator.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip rpm dpkg-dev
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name comicinfo-generator comicinfo_gui.py
          chmod +x dist/comicinfo-generator

      - name: Create tar.gz
        run: |
          mkdir -p release
          cp dist/comicinfo-generator release/
          tar -czvf comicinfo-generator-linux.tar.gz -C release comicinfo-generator

      - name: Create DEB
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p pkg/DEBIAN pkg/usr/local/bin
          cp dist/comicinfo-generator pkg/usr/local/bin/
          printf "Package: comicinfo-generator\nVersion: $VERSION\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: You\nDescription: ComicInfo GUI Generator\n" > pkg/DEBIAN/control
          dpkg-deb --build pkg comicinfo-generator.deb

      - name: Create RPM
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BASE_VERSION=$(echo $VERSION | cut -d- -f1)
          RELEASE_PART=$(echo $VERSION | cut -s -d- -f2)
          if [ -z "$RELEASE_PART" ]; then
            RELEASE_PART=1
          fi
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp dist/comicinfo-generator rpmbuild/SOURCES/
          printf "Name: comicinfo-generator\nVersion: $BASE_VERSION\nRelease: $RELEASE_PART\nSummary: ComicInfo GUI Generator\nLicense: MIT\n\n%%description\nComicInfo GUI Generator\n\n%%install\nmkdir -p %%{buildroot}/usr/local/bin\ncp %%{_sourcedir}/comicinfo-generator %%{buildroot}/usr/local/bin/\n\n%%files\n/usr/local/bin/comicinfo-generator\n" > rpmbuild/SPECS/comicinfo-generator.spec
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/comicinfo-generator.spec
          cp rpmbuild/RPMS/x86_64/*.rpm comicinfo-generator.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            comicinfo-generator-linux.tar.gz
            comicinfo-generator.deb
            comicinfo-generator.rpm

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller --onefile --windowed --name "ComicInfo Generator" comicinfo_gui.py

      - name: Package macOS app
        run: |
          mkdir -p release
          cp -R dist/"ComicInfo Generator.app" release/
          tar -czvf comicinfo-generator-macos.app.tar.gz -C release "ComicInfo Generator.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: comicinfo-generator-macos.app.tar.gz

  release:
    needs:
      - build-windows
      - build-linux
      - build-macos

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          files: |
            windows-build/comicinfo-generator.exe
            linux-builds/comicinfo-generator-linux.tar.gz
            linux-builds/comicinfo-generator.deb
            linux-builds/comicinfo-generator.rpm
            macos-build/comicinfo-generator-macos.app.tar.gz
