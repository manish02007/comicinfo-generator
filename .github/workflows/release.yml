name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller

      - run: |
          pyinstaller --onefile --noconsole --name comicinfo-generator comicinfo_gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/comicinfo-generator.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt update
          sudo apt install -y python3 python3-pip rpm dpkg-dev

      - run: pip install pyinstaller

      - run: |
          pyinstaller --onefile --name comicinfo-generator comicinfo_gui.py
          chmod +x dist/comicinfo-generator

      - run: |
          mkdir -p release
          cp dist/comicinfo-generator release/
          tar -czvf comicinfo-generator-linux.tar.gz -C release comicinfo-generator

      - run: |
          VERSION=${GITHUB_REF_NAME#v}

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/local/bin
          cp dist/comicinfo-generator pkg/usr/local/bin/

          cat > pkg/DEBIAN/control <<EOF
Package: comicinfo-generator
Version: $VERSION
Section: utils
Priority: optional
Architecture: amd64
Maintainer: You
Description: ComicInfo GUI Generator
EOF

          dpkg-deb --build pkg comicinfo-generator.deb

      - run: |
          VERSION=${GITHUB_REF_NAME#v}

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp dist/comicinfo-generator rpmbuild/SOURCES/

          cat > rpmbuild/SPECS/comicinfo-generator.spec <<EOF
Name: comicinfo-generator
Version: $VERSION
Release: 1
Summary: ComicInfo GUI Generator
License: MIT

%description
ComicInfo GUI Generator

%install
mkdir -p %{buildroot}/usr/local/bin
cp %{_sourcedir}/comicinfo-generator %{buildroot}/usr/local/bin/

%files
/usr/local/bin/comicinfo-generator
EOF

          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/comicinfo-generator.spec
          cp rpmbuild/RPMS/x86_64/*.rpm comicinfo-generator.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            comicinfo-generator-linux.tar.gz
            comicinfo-generator.deb
            comicinfo-generator.rpm

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller

      - name: Build macOS .app
        run: |
          pyinstaller --onefile --windowed --name "ComicInfo Generator" comicinfo_gui.py

      - name: Package .app
        run: |
          mkdir -p release
          cp -R dist/"ComicInfo Generator.app" release/
          tar -czvf comicinfo-generator-macos.app.tar.gz -C release "ComicInfo Generator.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: comicinfo-generator-macos.app.tar.gz

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          files: |
            windows-build/comicinfo-generator.exe
            linux-builds/comicinfo-generator-linux.tar.gz
            linux-builds/comicinfo-generator.deb
            linux-builds/comicinfo-generator.rpm
            macos-build/comicinfo-generator-macos.tar.gz
